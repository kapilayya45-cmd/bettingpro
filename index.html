<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<title>Pro Betting</title>

<style>
body{background:#0b1220;color:white;font-family:sans-serif;text-align:center}
.row{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #333}
.odds{padding:8px;border-radius:5px;cursor:pointer}
.green{background:green}
.red{background:red}

#betslip{
 position:fixed;
 bottom:0;
 width:100%;
 background:black;
 padding:10px;
 display:none;
}
</style>

</head>

<body>

<h2>🔥 PRO BET</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<div id="info"></div>

<h3>LIVE MATCHES</h3>
<div id="matches"></div>

<div id="betslip">
 <div id="betInfo"></div>
 <input id="amt" placeholder="Amount">
 <button onclick="bet()">Confirm</button>
</div>

<script>
let selOdds,selMatch;

async function post(url,data){
 let r = await fetch(url,{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify(data),
  credentials:"include" // 🔥 IMPORTANT
 });
 return await r.json();
}

async function get(url){
 let r = await fetch(url,{credentials:"include"});
 return await r.json();
}

async function register(){
 alert((await post("/register",{username:user.value,password:pass.value})).msg);
}

async function login(){
 alert((await post("/login",{username:user.value,password:pass.value})).msg);
 loadUser();
}

async function loadUser(){
 let d = await get("/me");
 if(d.username) info.innerHTML = d.username+" ₹"+d.wallet;
}

async function loadMatches(){
 let m = await get("/matches");

 matches.innerHTML = m.map(x=>`
  <div class="row">
   <div>${x.name}</div>
   <div class="odds green" onclick="openBet('${x.name}',${x.oddsA})">${x.oddsA}</div>
   <div class="odds red" onclick="openBet('${x.name}',${x.oddsB})">${x.oddsB}</div>
  </div>
 `).join("");
}

function openBet(match,odds){
 selMatch=match;
 selOdds=odds;
 betslip.style.display="block";
 betInfo.innerHTML=match+" @ "+odds;
}

async function bet(){
 let r = await post("/bet",{match:selMatch,odds:selOdds,amount:amt.value});
 alert(r.msg);
 betslip.style.display="none";
 loadUser();
}

setInterval(loadMatches,2000);
loadMatches();
</script>

</body>
</html>
