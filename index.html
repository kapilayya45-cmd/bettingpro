<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<title>Pro Betting</title>

<style>
body{background:#0b1220;color:white;font-family:Arial;text-align:center}

/* CARD */
.card{
 background:#1f2937;
 margin:10px;
 padding:15px;
 border-radius:15px;
 transition:0.3s;
 animation:fade 0.5s;
}
.card:hover{transform:scale(1.03)}

/* BUTTONS */
button{
 padding:10px;
 margin:5px;
 border:none;
 border-radius:10px;
 color:white;
 cursor:pointer;
 transition:0.2s;
}
.betA{background:#16a34a;}
.betB{background:#dc2626;}

button:hover{transform:scale(1.1)}

/* ODDS FLASH */
.up{color:#22c55e;}
.down{color:#ef4444;}

@keyframes fade{
 from{opacity:0;transform:translateY(10px)}
 to{opacity:1}
}
</style>
</head>

<body>

<h2>🔥 LIVE BETTING</h2>

<div id="matches"></div>

<script>
let lastOdds = {};

async function loadMatches(){
 let m = await fetch("/matches").then(r=>r.json());

 matches.innerHTML = m.map(x=>{

  let key = x.name;

  let prev = lastOdds[key] || {A:x.oddsA,B:x.oddsB};

  let upA = x.oddsA > prev.A;
  let upB = x.oddsB > prev.B;

  lastOdds[key] = {A:x.oddsA,B:x.oddsB};

  return `
  <div class="card">
    <b>${x.name}</b><br>
    ${x.score}<br>

    <button class="betA ${upA?'up':'down'}">
      A ${x.oddsA}
    </button>

    <button class="betB ${upB?'up':'down'}">
      B ${x.oddsB}
    </button>
  </div>`;
 }).join("");
}

// 🔥 FAST REFRESH (live feel)
setInterval(loadMatches,2000);

loadMatches();
</script>

</body>
</html>
