<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<title>Login Fix</title>

<style>
body{background:#0b1220;color:white;font-family:Arial;text-align:center;padding:50px}
input{padding:10px;margin:5px}
button{padding:10px;margin:5px}
</style>
</head>

<body>

<h2>Login</h2>

<input id="username" placeholder="Username"><br>
<input id="password" type="password" placeholder="Password"><br>

<button id="registerBtn">Register</button>
<button id="loginBtn">Login</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDEfm4NASnjaKU4dfUtsp_thdjvUUwIDZY",
  authDomain: "pro-betting-84120.firebaseapp.com",
  projectId: "pro-betting-84120"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ✅ SAFE INPUTS
const username = document.getElementById("username");
const password = document.getElementById("password");

// REGISTER
document.getElementById("registerBtn").onclick = async ()=>{
 let u = username.value.trim();
 let p = password.value.trim();

 if(!u || !p) return alert("Enter details");

 let ref = doc(db,"users",u);
 let snap = await getDoc(ref);

 if(snap.exists()){
  return alert("User exists");
 }

 await setDoc(ref,{username:u,password:p,wallet:1000});
 alert("Registered ✅");
};

// LOGIN
document.getElementById("loginBtn").onclick = async ()=>{
 let u = username.value.trim();
 let p = password.value.trim();

 if(!u || !p) return alert("Enter details");

 let ref = doc(db,"users",u);
 let snap = await getDoc(ref);

 if(!snap.exists()){
  return alert("User not found ❌");
 }

 if(snap.data().password !== p){
  return alert("Wrong password ❌");
 }

 localStorage.setItem("user",u);

 alert("Login success ✅");

 // 👉 redirect to main app
 window.location.href = "app.html";
};

</script>

</body>
</html>
