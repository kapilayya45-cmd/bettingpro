<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<style>
body{background:#0b1220;color:white;font-family:Arial;text-align:center}
.card{background:#1f2937;margin:10px;padding:10px;border-radius:10px}
.win{color:lime}.lose{color:red}
</style>
</head>

<body>

<h2>🔥 PRO BETTING</h2>

<input id="user" placeholder="user">
<input id="pass" type="password" placeholder="pass"><br>
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<div id="info"></div>

<h3>💰 Deposit</h3>
<input id="amount">
<input id="utr">
<button onclick="deposit()">Send</button>

<h3>🎮 Matches</h3>
<div id="matches"></div>

<h3>📊 History</h3>
<div id="history"></div>

<script>
let currentUser=null;

async function register(){
 let r=await fetch("/register",{method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({username:user.value,password:pass.value})});
 alert((await r.json()).msg);
}

async function login(){
 let r=await fetch("/login",{method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({username:user.value,password:pass.value})});
 let d=await r.json(); alert(d.msg);
 loadUser(); loadHistory();
}

async function loadUser(){
 let r=await fetch("/me"); let d=await r.json();
 if(d.username) info.innerHTML=`💰 ₹${d.wallet}`;
}

async function loadMatches(){
 let m=await fetch("/matches").then(r=>r.json());
 matches.innerHTML=m.map(x=>`
  <div class="card">
   ${x.name}<br>${x.score}<br>
   <button onclick="bet(${x.oddsA})">A ${x.oddsA}</button>
   <button onclick="bet(${x.oddsB})">B ${x.oddsB}</button>
  </div>`).join("");
}

async function bet(o){
 let amt=prompt("Amount");
 let r=await fetch("/bet",{method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({amount:amt,odds:o})});
 let d=await r.json();
 alert(d.msg); loadUser(); loadHistory();
}

async function deposit(){
 let r=await fetch("/deposit",{method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({amount:amount.value,utr:utr.value})});
 alert((await r.json()).msg);
}

async function loadHistory(){
 let h=await fetch("/history").then(r=>r.json());
 history.innerHTML=h.map(x=>`
  <div class="card">
   ₹${x.amount} | ${x.result}
  </div>`).join("");
}

setInterval(loadMatches,3000);
loadMatches();
</script>

</body>
</html>
