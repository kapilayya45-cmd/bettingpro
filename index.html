<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<title>Pro Betting</title>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:white}
.topbar{display:flex;justify-content:space-between;padding:10px;background:#020617}
.row{display:flex;justify-content:space-between;padding:12px;border-bottom:1px solid #1f2937}
.odds{padding:10px;border-radius:6px;cursor:pointer}
.green{background:#16a34a}
.red{background:#dc2626}
</style>
</head>

<body>

<div class="topbar">
 <div>🔥 PRO BET</div>
 <div id="wallet">₹0</div>
</div>

<div style="text-align:center;padding:10px">
 <input id="user" placeholder="user">
 <input id="pass" type="password" placeholder="pass">
 <button onclick="register()">Register</button>
 <button onclick="login()">Login</button>
</div>

<div id="matches"></div>

<script>

// ✅ POST
async function post(url,data){
 let r = await fetch(url,{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify(data),
  credentials:"include"   // 🔥 IMPORTANT
 });
 return await r.json();
}

// ✅ GET
async function get(url){
 let r = await fetch(url,{
  credentials:"include"   // 🔥 IMPORTANT
 });
 return await r.json();
}

// REGISTER
async function register(){
 let res = await post("/register",{username:user.value,password:pass.value});
 alert(res.msg);
}

// LOGIN
async function login(){
 let res = await post("/login",{username:user.value,password:pass.value});
 alert(res.msg);

 if(res.msg==="Login success"){
  loadUser();   // 🔥 FIX
 }
}

// LOAD USER
async function loadUser(){
 let d = await get("/me");
 console.log("USER:",d);

 if(d.username){
  wallet.innerHTML="₹"+d.wallet;
 }
}

// LOAD MATCHES
async function loadMatches(){
 let m = await get("/matches");

 matches.innerHTML = m.map(x=>`
  <div class="row">
   <div>${x.name}<br>${x.score}</div>
   <div class="odds green">${x.oddsA}</div>
   <div class="odds red">${x.oddsB}</div>
  </div>
 `).join("");
}

// AUTO LOAD
loadUser();
setInterval(loadMatches,5000);
loadMatches();

</script>

</body>
</html>
