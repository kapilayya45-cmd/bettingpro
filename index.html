<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<title>Pro Bet</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:white}
.center{text-align:center;padding:40px}
.row{display:flex;justify-content:space-between;padding:12px;border-bottom:1px solid #1f2937}
.green{background:#16a34a;padding:8px;cursor:pointer}
.red{background:#dc2626;padding:8px;cursor:pointer}
#betslip{position:fixed;right:0;top:0;width:250px;height:100%;background:black;padding:10px;display:none}
</style>
</head>

<body>

<div id="loginBox" class="center">
<h2>Login</h2>
<input id="u" placeholder="Username"><br><br>
<input id="p" placeholder="Password"><br><br>
<button onclick="reg()">Register</button>
<button onclick="log()">Login</button>
</div>

<div id="appBox" style="display:none">

<div style="padding:10px;background:#020617">
🔥 PRO BET | Wallet: ₹<span id="wallet">0</span>
</div>

<h3>🏏 LIVE MATCHES</h3>
<div id="matches"></div>

<h3>📊 Bet History</h3>
<div id="history"></div>

</div>

<div id="betslip">
<h3>Bet Slip</h3>
<div id="betInfo"></div>
<input id="amt" placeholder="Amount">
<button onclick="placeBet()">Bet</button>
</div>

<script>

// Firebase
firebase.initializeApp({
  apiKey: "AIzaSyDEfm4NASnjaKU4dfUtsp_thdjvUUwIDZY",
  authDomain: "pro-betting-84120.firebaseapp.com",
  projectId: "pro-betting-84120"
});

const db = firebase.firestore();

let currentUser=null;
let selMatch,selOdds;

// REGISTER
function reg(){
 db.collection("users").doc(u.value).set({
  password:p.value,
  wallet:1000
 });
 alert("Registered");
}

// LOGIN
function log(){
 db.collection("users").doc(u.value).get().then(doc=>{
  if(!doc.exists) return alert("No user");
  if(doc.data().password!==p.value) return alert("Wrong pass");

  currentUser=u.value;
  showApp();
 });
}

// SHOW APP
function showApp(){
 loginBox.style.display="none";
 appBox.style.display="block";
 loadUser();
 loadMatches();
 loadHistory();

 // 🔥 auto refresh (live feel)
 setInterval(loadMatches,5000);
}

// WALLET
function loadUser(){
 db.collection("users").doc(currentUser).get().then(doc=>{
  wallet.innerHTML=doc.data().wallet;
 });
}

// 🔥 LIVE MATCH SIMULATION
let liveMatches=[
 {name:"India vs Australia",score1:120,score2:110},
 {name:"CSK vs MI",score1:80,score2:75}
];

function loadMatches(){

 // random score update (live feel)
 liveMatches.forEach(m=>{
  m.score1 += Math.floor(Math.random()*5);
  m.score2 += Math.floor(Math.random()*5);
 });

 matches.innerHTML=liveMatches.map(m=>`
  <div class="row">
   <div>${m.name}<br>${m.score1}/${Math.floor(Math.random()*10)} - ${m.score2}/${Math.floor(Math.random()*10)}</div>
   <div class="green" onclick="openSlip('${m.name}',1.9)">1.9</div>
   <div class="red" onclick="openSlip('${m.name}',2.2)">2.2</div>
  </div>
 `).join("");
}

// BET
function openSlip(m,o){
 selMatch=m;
 selOdds=o;
 betslip.style.display="block";
 betInfo.innerHTML=m+" @ "+o;
}

// 🔥 FIXED BET FUNCTION
function placeBet(){
 let amount=Number(amt.value);

 if(!amount) return alert("Enter amount");

 let ref=db.collection("users").doc(currentUser);

 ref.get().then(doc=>{
  let data=doc.data();

  if(data.wallet<amount) return alert("Low balance");

  let win=Math.random()>0.5;
  let walletNew=data.wallet-amount;

  if(win){
    walletNew += amount*selOdds;
  }

  ref.update({wallet:walletNew}).then(()=>{

    db.collection("bets").add({
      user:currentUser,
      match:selMatch,
      amount:amount,
      result:win?"WIN":"LOSE",
      time:Date.now()
    }).then(()=>{

      alert(win?"WIN 🎉":"LOSE ❌");

      loadUser();
      loadHistory();
      betslip.style.display="none";
    });

  });

 });
}

// HISTORY
function loadHistory(){
 db.collection("bets")
 .where("user","==",currentUser)
 .get()
 .then(snap=>{
  let list=[];
  snap.forEach(d=>list.push(d.data()));

  history.innerHTML=list.map(x=>`
   <div class="row">
    <div>${x.match}<br>₹${x.amount}</div>
    <div>${x.result}</div>
   </div>
  `).join("");
 });
}

</script>

</body>
</html>
