<!DOCTYPE html>
<html>
<head>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body style="background:black;color:white;text-align:center;padding:50px">

<h2>FINAL LOGIN DEBUG</h2>

<input id="u" placeholder="Username"><br><br>
<input id="p" placeholder="Password"><br><br>

<button onclick="reg()">Register</button>
<button onclick="log()">Login</button>

<script>

firebase.initializeApp({
  apiKey: "AIzaSyDEfm4NASnjaKU4dfUtsp_thdjvUUwIDZY",
  authDomain: "pro-betting-84120.firebaseapp.com",
  projectId: "pro-betting-84120"
});

const db = firebase.firestore();

// REGISTER
function reg(){
 let u = uInput.value;
 let p = pInput.value;

 db.collection("users").doc(u).set({
   password:p,
   wallet:1000
 }).then(()=>{
   alert("Registered ✅");
 }).catch(e=>{
   alert("ERROR: "+e.message);
   console.log(e);
 });
}

// LOGIN
function log(){
 let u = uInput.value;
 let p = pInput.value;

 db.collection("users").doc(u).get()
 .then(doc=>{
   if(!doc.exists){
     alert("No user ❌");
   }else if(doc.data().password !== p){
     alert("Wrong pass ❌");
   }else{
     alert("Login success ✅");
   }
 })
 .catch(e=>{
   alert("ERROR: "+e.message);
   console.log(e);
 });
}

// FIX INPUTS
const uInput = document.getElementById("u");
const pInput = document.getElementById("p");

</script>

</body>
</html>
