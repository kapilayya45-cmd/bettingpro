<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<title>Pro Betting</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  text-align:center;
}

/* HEADER */
.header{
  background:#111827;
  padding:15px;
  font-weight:bold;
  color:#22c55e;
  box-shadow:0 0 10px rgba(0,0,0,0.5);
}

/* INPUTS */
input{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  width:40%;
}

/* BUTTON */
button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  cursor:pointer;
  transition:0.2s;
}
button:hover{
  transform:scale(1.05);
  background:#16a34a;
}

/* CARD */
.card{
  background:#1f2937;
  margin:10px;
  padding:15px;
  border-radius:15px;
  animation:fadeIn 0.5s ease;
  transition:0.3s;
}
.card:hover{
  transform:translateY(-5px) scale(1.02);
  box-shadow:0 10px 20px rgba(0,0,0,0.5);
}

/* BET BUTTONS */
.betA{background:#16a34a;}
.betB{background:#dc2626;}
.betA:hover{background:#22c55e;}
.betB:hover{background:#ef4444;}

/* HISTORY */
.win{color:#22c55e;}
.lose{color:#ef4444;}

/* ANIMATIONS */
@keyframes fadeIn{
 from{opacity:0;transform:translateY(10px)}
 to{opacity:1;transform:translateY(0)}
}

/* RESULT POP */
#popup{
 position:fixed;
 top:20px;
 left:50%;
 transform:translateX(-50%);
 background:#111827;
 padding:15px 25px;
 border-radius:10px;
 display:none;
 font-weight:bold;
}
</style>
</head>

<body>

<div class="header">🔥 PRO BETTING</div>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<div id="info"></div>

<h3>💰 Deposit</h3>
<input id="amount" placeholder="Amount">
<input id="utr" placeholder="UTR">
<button onclick="deposit()">Send</button>

<h3>💸 Withdraw</h3>
<input id="wamount" placeholder="Amount">
<input id="upi" placeholder="UPI">
<button onclick="withdraw()">Withdraw</button>

<h3>🎮 Matches</h3>
<div id="matches"></div>

<h3>📊 History</h3>
<div id="history"></div>

<div id="popup"></div>

<script>
let currentUser=null;

// 🔔 popup animation
function showPopup(msg,color){
 let p=document.getElementById("popup");
 p.innerText=msg;
 p.style.display="block";
 p.style.color=color;

 setTimeout(()=>p.style.display="none",2000);
}

async function register(){
 let r=await fetch("/register",{method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({username:user.value,password:pass.value})});
 showPopup((await r.json()).msg,"white");
}

async function login(){
 let r=await fetch("/login",{method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({username:user.value,password:pass.value})});
 let d=await r.json();
 showPopup(d.msg,"white");
 loadUser(); loadHistory();
}

async function loadUser(){
 let r=await fetch("/me");
 let d=await r.json();
 if(d.username) info.innerHTML=`👤 ${d.username} | 💰 ₹${d.wallet}`;
}

async function loadMatches(){
 let m=await fetch("/matches").then(r=>r.json());

 matches.innerHTML=m.map(x=>`
  <div class="card">
   <b>${x.name}</b><br>${x.score}<br>
   <button class="betA" onclick="bet(${x.oddsA})">A ${x.oddsA}</button>
   <button class="betB" onclick="bet(${x.oddsB})">B ${x.oddsB}</button>
  </div>`).join("");
}

async function bet(o){
 let amt=prompt("Enter amount");
 let r=await fetch("/bet",{method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({amount:amt,odds:o})});

 let d=await r.json();

 if(d.msg==="WIN"){
   showPopup("🏆 WIN ₹"+d.balance,"lime");
 }else{
   showPopup("❌ LOSE","red");
 }

 loadUser();
 loadHistory();
}

async function deposit(){
 let r=await fetch("/deposit",{method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({amount:amount.value,utr:utr.value})});
 showPopup((await r.json()).msg,"white");
}

async function withdraw(){
 let r=await fetch("/withdraw",{method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({amount:wamount.value,upi:upi.value})});
 showPopup((await r.json()).msg,"white");
 loadUser();
}

async function loadHistory(){
 let h=await fetch("/history").then(r=>r.json());

 history.innerHTML=h.map(x=>`
  <div class="card">
   ₹${x.amount} | 
   <span class="${x.result=='WIN'?'win':'lose'}">${x.result}</span>
  </div>`).join("");
}

setInterval(loadMatches,3001);
loadMatches();
</script>

</body>
</html>
