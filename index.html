<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<title>Login Fixed</title>

<!-- 🔥 FIREBASE CDN (NO MODULE) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body style="background:black;color:white;text-align:center;padding:50px">

<h2>Login</h2>

<input id="u" placeholder="Username"><br><br>
<input id="p" type="password" placeholder="Password"><br><br>

<button onclick="reg()">Register</button>
<button onclick="log()">Login</button>

<script>

// 🔥 INIT FIREBASE
firebase.initializeApp({
  apiKey: "AIzaSyDEfm4NASnjaKU4dfUtsp_thdjvUUwIDZY",
  authDomain: "pro-betting-84120.firebaseapp.com",
  projectId: "pro-betting-84120"
});

const db = firebase.firestore();

// REGISTER
function reg(){
 let u = document.getElementById("u").value;
 let p = document.getElementById("p").value;

 if(!u || !p) return alert("Enter details");

 db.collection("users").doc(u).get().then(doc=>{
   if(doc.exists){
     alert("User exists");
   }else{
     db.collection("users").doc(u).set({
       password:p,
       wallet:1000
     });
     alert("Registered ✅");
   }
 });
}

// LOGIN
function log(){
 let u = document.getElementById("u").value;
 let p = document.getElementById("p").value;

 db.collection("users").doc(u).get().then(doc=>{
   if(!doc.exists){
     return alert("User not found ❌");
   }

   if(doc.data().password !== p){
     return alert("Wrong password ❌");
   }

   localStorage.setItem("user",u);

   alert("Login success ✅");
 });
}

</script>

</body>
</html>
