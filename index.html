<!DOCTYPE html>
<html>
<head>
<title>Pro Betting</title>
<style>
body{background:#0f172a;color:white;font-family:Arial;text-align:center}
.card{background:#1e293b;margin:10px;padding:10px;border-radius:10px}
button{padding:8px;margin:5px;border:none;border-radius:5px;color:white}
.teamA{background:green}
.teamB{background:red}
</style>
</head>

<body>

<h2>🔥 PRO BETTING</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<br>
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<div id="info"></div>

<hr>

<h3>💰 Deposit</h3>
<input id="amount" placeholder="Amount">
<input id="utr" placeholder="UTR">
<button onclick="deposit()">Submit</button>

<hr>

<div id="matches"></div>

<script>
let currentUser=null;

async function register(){
 let r=await fetch("/register",{method:"POST",headers:{"Content-Type":"application/json"},
 body:JSON.stringify({username:user.value,password:pass.value})});
 alert((await r.json()).msg);
}

async function login(){
 let r=await fetch("/login",{method:"POST",headers:{"Content-Type":"application/json"},
 body:JSON.stringify({username:user.value,password:pass.value})});
 let d=await r.json(); alert(d.msg); loadUser();
}

async function loadUser(){
 let r=await fetch("/me"); let d=await r.json();
 if(d.username){currentUser=d;info.innerHTML=`👤 ${d.username} | 💰 ₹${d.wallet}`}
}

async function logout(){await fetch("/logout");info.innerHTML="";}

async function loadMatches(){
 let m=await fetch("/matches").then(r=>r.json());
 matches.innerHTML=m.map(x=>`
  <div class="card">
    <b>${x.name}</b><br>${x.score} (${x.status})<br>
    <button class="teamA" onclick="bet(${x.oddsA})">A ${x.oddsA}</button>
    <button class="teamB" onclick="bet(${x.oddsB})">B ${x.oddsB}</button>
  </div>
 `).join("");
}

async function bet(odds){
 if(!currentUser) return alert("Login first");
 let amount=prompt("Enter amount");
 let r=await fetch("/bet",{method:"POST",headers:{"Content-Type":"application/json"},
 body:JSON.stringify({amount,odds})});
 let d=await r.json();
 alert(d.msg+" | Balance ₹"+d.balance);
 loadUser();
}

async function deposit(){
 let r=await fetch("/deposit",{method:"POST",headers:{"Content-Type":"application/json"},
 body:JSON.stringify({amount:amount.value,utr:utr.value})});
 alert((await r.json()).msg);
}
setInterval(loadMatches,3000);
loadMatches();
</script>

</body>
</html>
