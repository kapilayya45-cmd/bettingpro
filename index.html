<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<title>Pro Betting</title>
</head>

<body style="background:#020617;color:white;text-align:center;font-family:sans-serif">

<h2>🔥 PRO BET</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<div id="info"></div>

<h3>💰 Deposit</h3>
<input id="amount" placeholder="Amount">
<button onclick="deposit()">Send</button>

<h3>💸 Withdraw</h3>
<input id="wamount" placeholder="Amount">
<button onclick="withdraw()">Withdraw</button>

<h3>🎮 Matches</h3>
<div id="matches"></div>

<script>
async function post(url,data){
 let r = await fetch(url,{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify(data)
 });
 return await r.json();
}

async function get(url){
 let r = await fetch(url);
 return await r.json();
}

async function register(){
 alert((await post("/register",{username:user.value,password:pass.value})).msg);
}

async function login(){
 alert((await post("/login",{username:user.value,password:pass.value})).msg);
 loadUser();
}

async function loadUser(){
 let d = await get("/me");
 if(d.username) info.innerHTML=d.username+" ₹"+d.wallet;
}

async function loadMatches(){
 let m = await get("/matches");
 matches.innerHTML = m.map(x=>`
  <div>
   ${x.name} ${x.score}<br>
   A ${x.oddsA} | B ${x.oddsB}
  </div>`).join("");
}

async function deposit(){
 alert((await post("/deposit",{amount:amount.value})).msg);
}

async function withdraw(){
 alert((await post("/withdraw",{amount:wamount.value})).msg);
}

setInterval(loadMatches,2000);
loadMatches();
</script>

</body>
</html>
