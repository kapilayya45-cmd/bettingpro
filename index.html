<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<title>Login</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{background:#0b1220;color:white;text-align:center;padding:50px;font-family:Arial}
input{padding:10px;margin:5px}
button{padding:10px;margin:5px}
</style>

</head>

<body>

<h2>🔥 PRO BET LOGIN</h2>

<input id="u" placeholder="Username"><br>
<input id="p" type="password" placeholder="Password"><br>

<button onclick="reg()">Register</button>
<button onclick="log()">Login</button>

<script>

// 🔥 Firebase init
firebase.initializeApp({
  apiKey: "AIzaSyDEfm4NASnjaKU4dfUtsp_thdjvUUwIDZY",
  authDomain: "pro-betting-84120.firebaseapp.com",
  projectId: "pro-betting-84120"
});

const db = firebase.firestore();

// REGISTER
function reg(){
 let u = document.getElementById("u").value;
 let p = document.getElementById("p").value;

 if(!u || !p) return alert("Enter details");

 db.collection("users").doc(u).get().then(doc=>{
   if(doc.exists){
     alert("User exists");
   }else{
     db.collection("users").doc(u).set({
       password:p,
       wallet:1000
     });
     alert("Registered ✅");
   }
 });
}

// LOGIN + REDIRECT
function log(){
 let u = document.getElementById("u").value;
 let p = document.getElementById("p").value;

 db.collection("users").doc(u).get().then(doc=>{
   if(!doc.exists){
     return alert("User not found ❌");
   }

   if(doc.data().password !== p){
     return alert("Wrong password ❌");
   }

   localStorage.setItem("user",u);

   alert("Login success ✅");

   // 🔥 REDIRECT FIX
   window.location.href = "./app.html";
 });
}

</script>

</body>
</html>
