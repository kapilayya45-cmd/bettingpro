<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<title>Admin Panel</title>

<style>
body{background:#020617;color:white;font-family:sans-serif;text-align:center}
.card{background:#1f2937;margin:10px;padding:10px;border-radius:10px}
button{padding:8px;margin:5px;border:none;border-radius:5px}
.approve{background:green}
.reject{background:red}
</style>
</head>

<body>

<h2>👑 ADMIN PANEL</h2>

<input id="user" placeholder="Admin Username">
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>

<h3>💰 Deposits</h3>
<div id="deposits"></div>

<h3>💸 Withdraws</h3>
<div id="withdraws"></div>

<script>
async function login(){
 let r=await fetch("/admin/login",{method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({username:user.value,password:pass.value})});
 alert((await r.json()).msg);
 loadData();
}

async function loadData(){
 let d=await fetch("/admin/deposits").then(r=>r.json());

 deposits.innerHTML=d.map(x=>`
  <div class="card">
   ${x.username} ₹${x.amount}
   <button class="approve" onclick="approve('${x._id}')">Approve</button>
  </div>`).join("");

 let w=await fetch("/admin/withdraws").then(r=>r.json());

 withdraws.innerHTML=w.map(x=>`
  <div class="card">
   ${x.username} ₹${x.amount}
   <button class="approve" onclick="wapprove('${x._id}')">Approve</button>
   <button class="reject" onclick="wreject('${x._id}')">Reject</button>
  </div>`).join("");
}

async function approve(id){
 await fetch("/admin/approve",{method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({id})});
 loadData();
}

async function wapprove(id){
 await fetch("/admin/withdraw-approve",{method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({id})});
 loadData();
}

async function wreject(id){
 await fetch("/admin/withdraw-reject",{method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({id})});
 loadData();
}
</script>

</body>
</html>
