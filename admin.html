<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<title>Admin</title>
</head>

<body style="background:#020617;color:white;text-align:center">

<h2>ADMIN</h2>

<input id="user" placeholder="username">
<input id="pass" type="password" placeholder="password"><br>
<button onclick="login()">Login</button>

<div id="panel" style="display:none"></div>

<script>

const BASE = "https://bettingpro-4ie8.onrender.com";

// SAFE FETCH
async function post(url,data){
 try{
  let r = await fetch(BASE+url,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });
  return await r.json();
 }catch{
  alert("server error");
 }
}

// LOGIN
async function login(){
 let d = await post("/admin/login",{username:user.value,password:pass.value});

 alert(d?.msg);

 if(d?.msg && d.msg.includes("success")){
  panel.style.display="block";
  load();
 }
}

// LOAD DATA
async function load(){
 let d = await fetch(BASE+"/admin/deposits").then(r=>r.json());
 panel.innerHTML = JSON.stringify(d);
}

</script>

</body>
</html>
