<!DOCTYPE html>
<html>
<body style="background:black;color:white;text-align:center">

<h2>ADMIN</h2>
<input id="pass">
<button onclick="load()">Load</button>

<div id="list"></div>

<script>
async function load(){
 let r=await fetch(`/admin/deposits?pass=${pass.value}`);
 let d=await r.json();

 list.innerHTML=d.map((x,i)=>`
  <div>
   ${x.username} ₹${x.amount} ${x.status}
   <button onclick="approve(${i})">✔</button>
   <button onclick="reject(${i})">❌</button>
  </div>`).join("");
}

async function approve(i){
 await fetch("/admin/approve",{method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({pass:pass.value,index:i})});
 load();
}

async function reject(i){
 await fetch("/admin/reject",{method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({pass:pass.value,index:i})});
 load();
}
</script>

</body>
</html>
